services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aelfred
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: node:22
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@latest --activate &&
             pnpm install &&
             cd apps/server &&
             pnpm run dev"
    env_file: .env
    environment:
      # Override localhost from .env — inside the compose network the DB host is the service name
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aelfred
    ports:
      - "4111:4111"
    volumes:
      - .:/app
      - server_root_modules:/app/node_modules
      - server_app_modules:/app/apps/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:22
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@latest --activate &&
             pnpm install &&
             cd apps/web &&
             pnpm exec next dev --port 3000 --hostname 0.0.0.0"
    env_file: .env
    environment:
      # Required for hot reload on macOS — Docker Desktop doesn't forward inotify events
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_root_modules:/app/node_modules
      - web_app_modules:/app/apps/web/node_modules

volumes:
  postgres_data:
  server_root_modules:
  server_app_modules:
  web_root_modules:
  web_app_modules:
